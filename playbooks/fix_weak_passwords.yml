---
- name: 弱口令修复 — 修改系统 / 数据库弱密码为强随机密码
  hosts: all
  gather_facts: yes
  become: yes
  vars:
    # 由扫描数据通过 extra_vars 传入，格式示例：
    # system_users:
    #   - username: "vagrant"
    #     host: "localhost"
    # mysql_users:
    #   - username: "root"
    #     host: "localhost"
    # pg_users:
    #   - username: "postgres"
    #     host: "localhost"
    # redis_host: "127.0.0.1"
    # redis_port: 6379
    system_users: []
    mysql_users: []
    pg_users: []
    redis_host: ""
    redis_port: 6379
    generated_passwords: []
    password_length: 24

  tasks:
    - name: 生成系统用户强随机密码
      set_fact:
        generated_passwords: >
          {{ generated_passwords + [{
            'type': 'system',
            'username': item.username,
            'new_password': lookup('password', '/dev/null chars=ascii_letters,digits,punctuation length=' ~ password_length)
          }] }}
      loop: "{{ system_users }}"
      loop_control:
        label: "system:{{ item.username }}"

    - name: 修改系统用户密码
      user:
        name: "{{ item.username }}"
        password: "{{ item.new_password | password_hash('sha512') }}"
        update_password: always
      loop: "{{ generated_passwords | selectattr('type', 'equalto', 'system') | list }}"
      loop_control:
        label: "{{ item.username }}"
      when: system_users | length > 0
      failed_when: false

    - name: 生成 MySQL 用户强随机密码
      set_fact:
        generated_passwords: >
          {{ generated_passwords + [{
            'type': 'mysql',
            'username': item.username,
            'host': item.host | default('localhost'),
            'new_password': lookup('password', '/dev/null chars=ascii_letters,digits length=20')
          }] }}
      loop: "{{ mysql_users }}"
      loop_control:
        label: "mysql:{{ item.username }}@{{ item.host | default('localhost') }}"

    - name: 修改 MySQL 用户密码
      mysql_user:
        login_user: "{{ mysql_admin_user | default('root') }}"
        login_password: "{{ mysql_admin_pass | default(omit) }}"
        login_host: "{{ mysql_admin_host | default('localhost') }}"
        name: "{{ item.username }}"
        host: "{{ item.host }}"
        password: "{{ item.new_password }}"
      loop: "{{ generated_passwords | selectattr('type', 'equalto', 'mysql') | list }}"
      loop_control:
        label: "{{ item.username }}@{{ item.host }}"
      when: mysql_users | length > 0
      failed_when: false

    - name: 生成 PostgreSQL 用户强随机密码
      set_fact:
        generated_passwords: >
          {{ generated_passwords + [{
            'type': 'postgresql',
            'username': item.username,
            'new_password': lookup('password', '/dev/null chars=ascii_letters,digits length=20')
          }] }}
      loop: "{{ pg_users }}"
      loop_control:
        label: "pg:{{ item.username }}"

    - name: 修改 PostgreSQL 用户密码
      postgresql_user:
        login_user: "{{ pg_admin_user | default('postgres') }}"
        login_password: "{{ pg_admin_pass | default(omit) }}"
        name: "{{ item.username }}"
        password: "{{ item.new_password }}"
      loop: "{{ generated_passwords | selectattr('type', 'equalto', 'postgresql') | list }}"
      loop_control:
        label: "{{ item.username }}"
      when: pg_users | length > 0
      become: yes
      become_user: postgres
      failed_when: false

    - name: 启用 Redis 密码认证
      block:
        - name: 生成 Redis 强密码
          set_fact:
            redis_password: "{{ lookup('password', '/dev/null chars=ascii_letters,digits length=32') }}"

        - name: 检测 Redis 配置文件
          stat:
            path: /etc/redis/redis.conf
          register: redis_conf

        - name: 设置 Redis requirepass
          lineinfile:
            path: /etc/redis/redis.conf
            regexp: "^#?requirepass"
            line: "requirepass {{ redis_password }}"
          when: redis_conf.stat.exists
          notify: restart redis

        - name: 禁用 Redis CONFIG 命令
          lineinfile:
            path: /etc/redis/redis.conf
            regexp: "^#?rename-command CONFIG"
            line: "rename-command CONFIG \"\""
          when: redis_conf.stat.exists

        - name: 将 Redis 密码加入记录
          set_fact:
            generated_passwords: >
              {{ generated_passwords + [{
                'type': 'redis',
                'username': 'default',
                'new_password': redis_password
              }] }}
      when: redis_host != ""

    - name: 保存新密码到安全文件
      copy:
        dest: /root/rayscan-passwords.txt
        content: |
          # RayScan 自动生成的密码 — 请安全保管并及时分发给相关人员
          # 生成时间: {{ ansible_date_time.iso8601 }}
          # 警告: 此文件包含敏感凭据，请勿泄露
          {{ generated_passwords | to_nice_yaml }}
        mode: '0600'
      when: generated_passwords | length > 0
      failed_when: false

    - name: 输出密码变更摘要
      debug:
        msg: "已修改 {{ generated_passwords | length }} 个账号密码，新密码已保存到 /root/rayscan-passwords.txt（chmod 600）"
      when: generated_passwords | length > 0

    - name: 提示人工处理事项
      debug:
        msg: >
          弱口令自动修复完成。
          注意事项：
          1. 新密码已保存到 /root/rayscan-passwords.txt，请安全保管
          2. 涉及人工使用的账号，请通知相关人员获取新密码后修改
          3. 如果某账号不应被自动修改，请手动恢复并在扫描中排除

  handlers:
    - name: restart redis
      service:
        name: "{{ 'redis-server' if ansible_os_family == 'Debian' else 'redis' }}"
        state: restarted
      failed_when: false