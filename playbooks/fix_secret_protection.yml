---
- name: 密钥泄露防护 — 部署检测配置 / pre-commit 钩子 / .gitignore
  hosts: all
  gather_facts: yes
  become: yes
  vars:
    project_path: "/opt/app"
    leaked_file: ""
    gitleaks_config: |
      [allowlist]
        description = "RayScan 自动部署的 Gitleaks 允许列表"
        regex-target = true

      [rules]
        [[rules]]
          id = "generic-api-key"
          description = "通用 API 密钥"
          regex = '''(?i)(?:api[_-]?key|apikey|secret|token|passwd|password|credential).{0,20}['"'][0-9a-zA-Z\-_=]{16,}['"']'''
          [rules.allowlist]
            regex-target = true
            regexes = ["example|placeholder|test|dummy|xxxx"]

        [[rules]]
          id = "private-key-file"
          description = "私钥文件"
          regex = '''-----BEGIN (?:RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
          [rules.allowlist]
            regex-target = true
            regexes = ["test|example|placeholder"]

        [[rules]]
          id = "high-entropy-string"
          description = "高熵字符串（潜在密钥）"
          regex = '''(?:password|secret|token|key|credential).{0,10}['"']?[0-9a-zA-Z\-_=]{20,}['"']?'''
          entropy = 4.0

  tasks:
    - name: 确保项目目录存在
      file:
        path: "{{ project_path }}"
        state: directory
        mode: '0755'
      ignore_errors: yes

    - name: 部署 .gitleaks.toml 配置
      copy:
        dest: "{{ project_path }}/.gitleaks.toml"
        content: "{{ gitleaks_config }}"
        mode: '0644'
      when: project_path != ""
      failed_when: false

    - name: 检查是否为 git 仓库
      stat:
        path: "{{ project_path }}/.git/config"
      register: git_config
      when: project_path != ""

    - name: 安装 gitleaks pre-commit hook
      copy:
        dest: "{{ project_path }}/.git/hooks/pre-commit"
        content: |
          #!/bin/sh
          # RayScan 自动部署 — Gitleaks pre-commit 检查
          if command -v gitleaks > /dev/null 2>&1; then
            gitleaks protect --staged --config="$(git rev-parse --show-toplevel)/.gitleaks.toml" 2>/dev/null
            if [ $? -ne 0 ]; then
              echo "[RayScan] 检测到密钥泄露，请移除敏感信息后重试"
              exit 1
            fi
          fi
          exit 0
        mode: '0755'
      when: git_config.stat.exists
      failed_when: false

    - name: 添加泄露文件到 .gitignore
      lineinfile:
        path: "{{ project_path }}/.gitignore"
        line: "{{ leaked_file }}"
        create: yes
        mode: '0644'
      when: leaked_file is defined and leaked_file != ""

    - name: 删除文件系统中的敏感文件
      file:
        path: "{{ leaked_file }}"
        state: absent
      when: leaked_file is defined and leaked_file != "" and delete_leaked_file | default(false)

    - name: 提示人工处理事项
      debug:
        msg: >
          密钥泄露防护配置已完成。
          如果密钥已被推送到远程仓库，请人工处理：
          1. 立即轮换该密钥（在对应服务中生成新密钥）
          2. 使用 git filter-branch 或 BFG Repo-Cleaner 从 git 历史中清除
          3. 通知安全团队审计访问日志