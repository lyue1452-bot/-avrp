# ============================================================
# Polaris IaC 修复工作流
# 在 Semgrep 完成后运行，对 K8s 部署清单执行自动修复
# ============================================================
name: Polaris IaC Fix

on:
  pull_request:
    types: [opened, synchronize]

env:
  AUTO_COMMIT_FIX: ${{ vars.AUTO_COMMIT_FIX || 'true' }}

permissions:
  contents: write
  pull-requests: write

jobs:
  polaris-fix:
    name: polaris-fix
    runs-on: ubuntu-latest
    # 避免 [skip ci] 提交引起的循环触发
    if: ${{ !contains(github.event.pull_request.title, '[skip ci]') && !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Polaris binary
        run: |
          POLARIS_VERSION=$(curl -s https://api.github.com/repos/FairwindsOps/polaris/releases/latest | grep tag_name | cut -d '"' -f 4)
          echo "Latest Polaris version: $POLARIS_VERSION"
          curl -sL "https://github.com/FairwindsOps/polaris/releases/download/${POLARIS_VERSION}/polaris_linux_amd64.tar.gz" -o polaris.tar.gz
          tar -xzf polaris.tar.gz
          chmod +x polaris
          sudo mv polaris /usr/local/bin/
          rm polaris.tar.gz

      - name: Run polaris fix on deploy/
        run: |
          if [ -d "deploy/" ] && [ "$(ls -A deploy/ 2>/dev/null)" ]; then
            polaris fix \
              --files-path deploy/ \
              --output-format yaml \
              --overwrite \
              --config .polaris.yaml \
              || echo "Polaris fix completed (may have warnings)"
          else
            echo "deploy/ directory is empty or does not exist, skipping"
          fi

      - name: Check for changes
        id: check-changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push Polaris fixes
        if: steps.check-changes.outputs.has_changes == 'true' && env.AUTO_COMMIT_FIX == 'true'
        run: |
          git config user.name "polaris-fix[bot]"
          git config user.email "polaris-fix[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: automatic Polaris IaC fix [skip ci]"
          git push